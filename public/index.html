<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Anniversary</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Georgia', serif;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #camera-bg {
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #ar-canvas {
            z-index: 2;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #ui-layer {
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        #status-text {
            opacity: 1;
            transition: opacity 1s;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #splash-arrow {
            font-size: 2.8rem;
            opacity: 0.6;
            animation: floatUp 2s ease-in-out infinite alternate;
        }

        @keyframes floatUp {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-14px); }
        }

        #splash-headline {
            font-size: 3.2rem;
            font-weight: 200;
            letter-spacing: 0.18em;
            font-family: sans-serif;
            margin: 4px 0 12px;
        }

        #status-message {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            opacity: 0.45;
            font-family: sans-serif;
        }

        #build-version {
            font-size: 0.6rem;
            font-family: monospace;
            opacity: 0.2;
            margin-top: 24px;
        }

        #debug-hud {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 4;
            font-family: monospace;
            font-size: 0.72rem;
            color: #fff;
            background: rgba(0,0,0,0.45);
            border-radius: 6px;
            padding: 6px 10px;
            line-height: 1.7;
            pointer-events: none;
            text-align: right;
        }

        #audio-mode-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 4;
            font-size: 1.1rem;
            color: white;
            /* 0.55 meets WCAG non-text 3:1 contrast for a white glyph over sunlit
               camera feed (~400-600 nits OLED reflection at ~alpha>=0.5 required);
               keeps the button findable without dominating the AR scene. */
            opacity: 0.55;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }

        #compass-indicator {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 4;
            font-size: 0.65rem;
            font-family: monospace;
            letter-spacing: 0.06em;
            color: white;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        #secret-override {
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            z-index: 9999;
            pointer-events: auto;
        }
    </style>
    <script src="version.js"></script>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/DeviceOrientationControls.js"></script>
</head>

<body>

    <video id="camera-bg" class="layer" autoplay playsinline muted webkit-playsinline></video>
    <canvas id="ar-canvas" class="layer"></canvas>

    <div id="ui-layer" class="layer">
        <div id="status-text">
            <div id="splash-arrow">↑</div>
            <div id="splash-headline">Look up</div>
            <span id="status-message">Locating…</span>
            <span id="build-version"></span>
        </div>
    </div>

    <div id="audio-mode-btn" title="Toggle earphone mode">♪</div>
    <div id="compass-indicator"></div>
    <div id="secret-override"></div>
    <div id="debug-hud">acquiring GPS…</div>

    <script type="module">
        import { initScene, startExperience, TARGET_LAT, TARGET_LNG } from './js/scene.js';
        import { toggleEarphonesMode } from './js/audio.js';
        import { bootstrapSensors, setTestMode } from './js/sensors.js';

        if (window.BUILD_VERSION) {
            document.getElementById('build-version').textContent = window.BUILD_VERSION;
        }

        initScene();
        bootstrapSensors();

        document.getElementById('audio-mode-btn').addEventListener('click', toggleEarphonesMode);

        let tapCount = 0;
        document.getElementById('secret-override').addEventListener('click', () => {
            tapCount++;
            if (tapCount >= 3) {
                // [40,60,120] = Material action-confirmed short-short-long cadence,
                // distinguishable from the per-tap 60ms tick.
                // typeof guard required: navigator.vibrate is absent on some Android WebView
                // configs without the VIBRATE permission declared in AndroidManifest.
                if (typeof navigator.vibrate === 'function') navigator.vibrate([40, 60, 120]);
                setTestMode(true);
                startExperience(TARGET_LAT, TARGET_LNG, true);
            } else {
                // 60ms matches Material Design short-tick (keyboard tap 50ms, button 70ms).
                if (typeof navigator.vibrate === 'function') navigator.vibrate(60);
            }
        });

    </script>
</body>

</html>
