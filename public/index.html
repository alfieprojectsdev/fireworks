<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Anniversary</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Georgia', serif;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #camera-bg {
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #ar-canvas {
            z-index: 2;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #ui-layer {
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        #status-text {
            opacity: 1;
            transition: opacity 1s;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #splash-arrow {
            font-size: 2.8rem;
            opacity: 0.6;
            animation: floatUp 2s ease-in-out infinite alternate;
        }

        @keyframes floatUp {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-14px); }
        }

        #splash-headline {
            font-size: 3.2rem;
            font-weight: 200;
            letter-spacing: 0.18em;
            font-family: sans-serif;
            margin: 4px 0 12px;
        }

        #status-message {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            opacity: 0.45;
            font-family: sans-serif;
        }

        #build-version {
            font-size: 0.6rem;
            font-family: monospace;
            opacity: 0.2;
            margin-top: 24px;
        }

        #debug-hud {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 4;
            font-family: monospace;
            font-size: 0.72rem;
            color: #fff;
            background: rgba(0,0,0,0.45);
            border-radius: 6px;
            padding: 6px 10px;
            line-height: 1.7;
            pointer-events: none;
            text-align: right;
        }

        #audio-mode-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 4;
            font-size: 1.1rem;
            color: white;
            /* 0.55 meets WCAG non-text 3:1 contrast for a white glyph over sunlit
               camera feed (~400-600 nits OLED reflection at ~alpha>=0.5 required);
               keeps the button findable without dominating the AR scene. */
            opacity: 0.55;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }

        #compass-indicator {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 4;
            font-size: 0.65rem;
            font-family: monospace;
            letter-spacing: 0.06em;
            color: white;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        #secret-override {
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            z-index: 9999;
            pointer-events: auto;
        }
    </style>
    <script src="version.js"></script>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/DeviceOrientationControls.js"></script>
</head>

<body>

    <video id="camera-bg" class="layer" autoplay playsinline muted webkit-playsinline></video>
    <canvas id="ar-canvas" class="layer"></canvas>

    <div id="ui-layer" class="layer">
        <div id="status-text">
            <div id="splash-arrow">↑</div>
            <div id="splash-headline">Look up</div>
            <span id="status-message">Locating…</span>
            <span id="build-version"></span>
        </div>
    </div>

    <div id="audio-mode-btn" title="Toggle earphone mode">♪</div>
    <div id="compass-indicator"></div>
    <div id="secret-override"></div>
    <div id="debug-hud">acquiring GPS…</div>

    <script>
        if (window.BUILD_VERSION) {
            document.getElementById('build-version').textContent = window.BUILD_VERSION;
        }

        const canvas = document.getElementById('ar-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        let controls;
        let showFireworks = false;

        // True once the first onNativeOrientationUpdate event arrives.
        // Guards the animate() loop: when true, controls.update() is skipped so the
        // native quaternion written directly to camera.quaternion is not overwritten
        // each frame. DeviceOrientationControls is still constructed and its internal
        // listeners remain attached for fallback. (ref: DL-008, DL-009)
        let nativeOrientationActive = false;
        // Staging buffer for the incoming native quaternion before camera.quaternion.set().
        let nativeQuat = new THREE.Quaternion();

        // --- Orchestration Variables ---
        const targetLat = 14.658888478751235;
        const targetLng = 121.071173166497;
        let experienceStarted = false;

        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const dLon = (lon2 - lon1) * toRad;
            const y = Math.sin(dLon) * Math.cos(lat2 * toRad);
            const x = Math.cos(lat1 * toRad) * Math.sin(lat2 * toRad) -
                      Math.sin(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.cos(dLon);
            return Math.atan2(y, x);
        }

        // --- 3D Spatial Structures ---
        let arGroup;
        let marqueeCylinder;
        let textIllumination = 0;
        let marqueeBaseOpacity = 0; // driven by proximity ≤30m
        let statsBaseOpacity = 0;   // driven by proximity ≤20m
        let userDistanceToChurch = Infinity; // metres, updated by watchPosition

        function createARGroup(userLat, userLng, isTestMode = false) {
            const group = new THREE.Group();
            
            if (isTestMode) {
                // Test Mode: Spawn 15 meters high, 40 meters straight ahead (-Z)
                group.position.set(0, 15, -40);
                console.log("AR Spawning in TEST MODE (fixed offset)");
            } else {
                // Production Mode: Calculate GPS offset
                const dist = getDistanceKm(userLat, userLng, targetLat, targetLng) * 1000; // meters
                const bearing = getBearing(userLat, userLng, targetLat, targetLng);
                
                // -Z is North, +X is East in standard Three.js orientation
                const xOffset = dist * Math.sin(bearing);
                const zOffset = -dist * Math.cos(bearing);
                
                // Set group exactly over the church, 15 meters high
                group.position.set(xOffset, 15, zOffset);
                console.log(`AR Spawning in PRODUCTION MODE (GPS: ${dist.toFixed(1)}m, bearing: ${bearing.toFixed(2)}rad)`);
            }
            
            // 2. Cylindrical Marquee
            const mCanvas = document.createElement('canvas');
            const mCtx = mCanvas.getContext('2d');
            mCanvas.width = 4096; mCanvas.height = 256;
            mCtx.font = "72px sans-serif";
            mCtx.textAlign = "center";
            mCtx.textBaseline = "middle";
            mCtx.shadowColor = "rgba(255, 220, 160, 0.4)";
            mCtx.shadowBlur = 8;
            mCtx.fillStyle = "white";

            // 3 repetitions evenly spaced (centers at 1/6, 3/6, 5/6 of canvas width)
            for(let i=0; i<3; i++) {
                mCtx.fillText("Happy Anniversary, Bhaze!", Math.round((i + 0.5) * 4096 / 3), 128);
            }
            
            const mTex = new THREE.CanvasTexture(mCanvas);
            mTex.wrapS = THREE.RepeatWrapping;
            
            const mMat = new THREE.MeshBasicMaterial({
                map: mTex, transparent: true, opacity: 0, 
                blending: THREE.AdditiveBlending, depthWrite: false,
                side: THREE.DoubleSide
            });
            // Radius sized to clear the chapel dome (~55m wide).
            const mGeo = new THREE.CylinderGeometry(30, 30, 4, 64, 1, true);
            marqueeCylinder = new THREE.Mesh(mGeo, mMat);
            group.add(marqueeCylinder);

            // 3. Time Stats
            const start = new Date('2008-05-15T00:00:00');
            const now = new Date();
            const diffMs = now - start;
            
            const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const weeks = Math.floor(days / 7);
            
            // Years counts completed anniversaries: a partial year (today before the
            // wedding month/day in the current calendar year) does not count as a full one.
            let years = now.getFullYear() - start.getFullYear();
            if (now.getMonth() < start.getMonth() || (now.getMonth() === start.getMonth() && now.getDate() < start.getDate())) { years--; }
            // monthsRaw derives from raw year/month fields so it measures elapsed months
            // on its own calendar boundary (day-of-month), independent of the
            // anniversary-day boundary used to define a completed year.
            let monthsRaw = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
            if (now.getDate() < start.getDate()) { monthsRaw--; }
            const months = monthsRaw;

            const stats = [
                { text: `${years} Years`, rotY: 0 },
                { text: `${months} Months`, rotY: Math.PI / 2 },
                { text: `${weeks} Weeks`, rotY: Math.PI },
                { text: `${days} Days`, rotY: -Math.PI / 2 }
            ];

            stats.forEach(stat => {
                const sCanvas = document.createElement('canvas');
                sCanvas.width = 512; sCanvas.height = 256;
                const sCtx = sCanvas.getContext('2d');
                sCtx.font = "56px sans-serif";
                sCtx.textAlign = "center";
                sCtx.textBaseline = "middle";
                sCtx.fillStyle = "rgba(255, 255, 255, 0.5)"; // 50% transparent base
                sCtx.fillText(stat.text, 256, 128);
                
                const sMat = new THREE.MeshBasicMaterial({
                    map: new THREE.CanvasTexture(sCanvas),
                    transparent: true, opacity: 0,
                    blending: THREE.AdditiveBlending, depthWrite: false,
                    side: THREE.DoubleSide
                });
                const sGeo = new THREE.PlaneGeometry(20, 10);
                const sMesh = new THREE.Mesh(sGeo, sMat);
                
                sMesh.position.set(0, -10, 0); // below marquee
                sMesh.rotation.y = stat.rotY;
                sMesh.translateZ(30);
                
                sMesh.userData.isStat = true;
                group.add(sMesh);
            });

            // Ground glow: faint additive ring at Y=0 under the church
            const ringGeo = new THREE.RingGeometry(12, 24, 64);
            const ringMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(0.85, 0.55, 1.0),
                transparent: true, opacity: 0.025,
                blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
            });
            const groundRing = new THREE.Mesh(ringGeo, ringMat);
            groundRing.rotation.x = -Math.PI / 2; // lay flat
            groundRing.position.y = -15;           // ground level (group sits at Y=15)
            groundRing.userData.isGround = true;
            group.add(groundRing);

            return group;
        }

        // --- High Quality Firework Shell ---
        const windDrift = new THREE.Vector3(0.015, 0, -0.005);

        class Firework {
            constructor() {
                this.isRocket = true;
                this.isDead = false;
                this.particles = null;

                this.hue = Math.random();
                this.color = new THREE.Color().setHSL(this.hue, 1, 0.6);

                const dist = 30 + Math.random() * 30;
                const angle = (Math.random() - 0.5) * 1.5; 
                this.pos = new THREE.Vector3(Math.sin(angle) * dist, -40, -Math.cos(angle) * dist);
                this.vel = new THREE.Vector3((Math.random() - 0.5) * 2, 4 + Math.random() * 3, (Math.random() - 0.5) * 2);
                
                // Add group offset if arGroup exists so fireworks spawn around the church
                if (arGroup) {
                    this.pos.x += arGroup.position.x;
                    this.pos.z += arGroup.position.z;
                }
                
                this.life = 0;
                this.maxLife = 120 + Math.random() * 60; 

                this.createRocket();
            }

            createRocket() {
                this.geometry = new THREE.BufferGeometry();
                const pos = new Float32Array([this.pos.x, this.pos.y, this.pos.z, this.pos.x, this.pos.y - 4, this.pos.z]);
                this.geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const material = new THREE.LineBasicMaterial({
                    color: new THREE.Color(0xffeebb),
                    transparent: true,
                    blending: THREE.AdditiveBlending
                });
                this.particles = new THREE.LineSegments(this.geometry, material);
                scene.add(this.particles);
            }

            explode() {
                scene.remove(this.particles);
                this.isRocket = false;
                
                // 0=Peony 1=Willow 2=Chrysanthemum 3=Heart 4=Lemniscate(∞) 5=Lissajous(3:2)
                const _r = Math.random();
                this.type = _r < 0.10 ? 3 : _r < 0.18 ? 4 : _r < 0.26 ? 5 : Math.floor(Math.random() * 3);
                if (this.type === 3) this.color = new THREE.Color().setHSL(0.93, 1.0, 0.75); // hot pink
                if (this.type === 4) this.color = new THREE.Color().setHSL(0.12, 1.0, 0.65); // amber gold
                if (this.type === 5) this.color = new THREE.Color().setHSL(0.55, 1.0, 0.70); // electric cyan

                this.particleCount = this.type === 2 ? 300 : this.type === 3 ? 120
                                   : this.type === 4 ? 160 : this.type === 5 ? 180 : 220;
                this.positions = new Float32Array(this.particleCount * 6);
                this.velocities = [];
                this.lifespans = [];

                for (let i = 0; i < this.particleCount; i++) {
                    let v;
                    // Shaped shells: pre-position particles along the parametric curve at explosion
                    // so the shape appears instantly rather than emerging slowly from a point.
                    // Velocity is slow outward drift; the curve offset carries the shape information.
                    let ox = 0, oy = 0, oz = 0; // position offset from explosion centre

                    if (this.type === 3) {
                        // Heart
                        const t = (i / this.particleCount) * Math.PI * 2;
                        const hx = 16 * Math.pow(Math.sin(t), 3);
                        const hy = (Math.random() - 0.5) * 2;
                        const hz = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                        const sc = 12 / 21; // scale max extent (~21) to 12 units
                        ox = hx * sc; oy = hy * sc; oz = hz * sc;
                        v = new THREE.Vector3(hx, hy, hz).normalize().multiplyScalar(0.8 + Math.random() * 0.4);
                    } else if (this.type === 4) {
                        // Lemniscate of Bernoulli (∞)
                        const t = (i / this.particleCount) * Math.PI * 2;
                        const d = 1 + Math.sin(t) * Math.sin(t);
                        const lx = Math.cos(t) / d;
                        const ly = (Math.random() - 0.5) * 0.12;
                        const lz = Math.sin(t) * Math.cos(t) / d;
                        ox = lx * 13; oy = ly * 13; oz = lz * 13; // max |lx|=1 → 13-unit radius
                        v = new THREE.Vector3(lx, ly, lz).normalize().multiplyScalar(0.8 + Math.random() * 0.4);
                    } else if (this.type === 5) {
                        // Lissajous 3:2
                        const t = (i / this.particleCount) * Math.PI * 2;
                        const lx = Math.sin(3 * t + Math.PI / 2);
                        const ly = (Math.random() - 0.5) * 0.12;
                        const lz = Math.sin(2 * t);
                        ox = lx * 11; oy = ly * 11; oz = lz * 11; // scale ≤√2 → ~11 units each axis
                        v = new THREE.Vector3(lx, ly, lz).normalize().multiplyScalar(0.8 + Math.random() * 0.4);
                    } else {
                        v = new THREE.Vector3(
                            (Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5)
                        ).normalize();
                        if (this.type === 0) v.multiplyScalar(Math.random() * 3 + 4);
                        else if (this.type === 1) v.multiplyScalar(Math.random() * 2 + 2);
                        else v.multiplyScalar(Math.random() * 4 + 5);
                    }

                    this.velocities.push(v);

                    const sx = this.pos.x + ox;
                    const sy = this.pos.y + oy;
                    const sz = this.pos.z + oz;
                    this.positions[i * 6]     = sx;
                    this.positions[i * 6 + 1] = sy;
                    this.positions[i * 6 + 2] = sz;
                    this.positions[i * 6 + 3] = sx;
                    this.positions[i * 6 + 4] = sy;
                    this.positions[i * 6 + 5] = sz;

                    // Shaped shells: tight lifespan so the outline fades coherently
                    this.lifespans.push(this.type >= 3 ? 0.88 + Math.random() * 0.18 : 0.7 + Math.random() * 0.6);
                }

                this.geometry = new THREE.BufferGeometry();
                this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
                const material = new THREE.LineBasicMaterial({
                    color: this.color,
                    transparent: true,
                    blending: THREE.AdditiveBlending
                });
                this.particles = new THREE.LineSegments(this.geometry, material);
                scene.add(this.particles);
                
                // Environmental Illumination
                if (arGroup) {
                    const distToText = this.pos.distanceTo(arGroup.position);
                    if (distToText < 150) {
                        textIllumination = Math.max(textIllumination, 1.0 - (distToText / 150));
                    }
                }

                playExplosion(this.pos, this.type);
            }

            update() {
                if (this.isRocket) {
                    this.pos.add(this.vel);
                    this.vel.y -= 0.2; // Gravity
                    this.vel.add(windDrift);
                    const posArr = this.geometry.attributes.position.array;
                    
                    // Update LineSegment (streak from current pos to previous pos offset)
                    posArr[0] = this.pos.x; posArr[1] = this.pos.y; posArr[2] = this.pos.z;
                    posArr[3] = this.pos.x - this.vel.x * 2; 
                    posArr[4] = this.pos.y - this.vel.y * 2; 
                    posArr[5] = this.pos.z - this.vel.z * 2;
                    
                    this.geometry.attributes.position.needsUpdate = true;
                    this.particles.material.opacity = 0.5 + Math.random() * 0.5;

                    if (this.vel.y <= 1) this.explode();
                } else {
                    this.life++;
                    const posArr = this.geometry.attributes.position.array;
                    let allDead = true;
                    const fadeRate = this.life / this.maxLife;
                    
                    for (let i = 0; i < this.particleCount; i++) {
                        if (fadeRate * this.lifespans[i] > 1) {
                            posArr[i * 6] = posArr[i * 6 + 3]; // collapse streak
                            posArr[i * 6 + 1] = posArr[i * 6 + 4];
                            posArr[i * 6 + 2] = posArr[i * 6 + 5];
                            continue;
                        }
                        allDead = false;
                        
                        const v = this.velocities[i];
                        const px = posArr[i * 6];
                        const py = posArr[i * 6 + 1];
                        const pz = posArr[i * 6 + 2];
                        
                        // New head position
                        posArr[i * 6] += v.x;
                        posArr[i * 6 + 1] += v.y;
                        posArr[i * 6 + 2] += v.z;
                        
                        // Tail position trails behind
                        // Short streaks on shaped shells so the outline stays crisp
                        const streakLength = this.type === 2 ? 3 : (this.type >= 3) ? 0.8 : 1.5;
                        posArr[i * 6 + 3] = posArr[i * 6] - v.x * streakLength;
                        posArr[i * 6 + 4] = posArr[i * 6 + 1] - v.y * streakLength;
                        posArr[i * 6 + 5] = posArr[i * 6 + 2] - v.z * streakLength;

                        // Minimal gravity on shaped shells so the outline stays readable
                        v.y -= this.type === 1 ? 0.05 : (this.type >= 3) ? 0.004 : 0.03;
                        v.multiplyScalar(this.type >= 3 ? 0.985 : 0.96);
                        v.add(windDrift);
                    }
                    this.geometry.attributes.position.needsUpdate = true;
                    
                    const baseOpacity = 1 - Math.pow(fadeRate, 2);
                    this.particles.material.opacity = baseOpacity * (0.6 + Math.random() * 0.4);
                    
                    if (allDead || this.life >= this.maxLife) this.isDead = true;
                }
            }

            destroy() {
                scene.remove(this.particles);
                this.geometry.dispose();
                this.particles.material.dispose();
            }
        }

        let fireworks = [];

        // --- Spatial Audio ---
        let audioCtx = null;
        let earphonesMode = false;
        let reverbNode = null;
        let reverbGain = null;
        let _noisePool = null; // shared AudioBuffers; source nodes are cheap, buffer fills are not
        let _masterComp = null; // shared compressor; created once, reused by every explosion

        // Unlock AudioContext on first touch — GPS may trigger startExperience outside a user gesture,
        // so we pre-create and resume the context here while we're guaranteed to be in a gesture.
        function unlockAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume().then(() => initAudioGraph(audioCtx));
            document.removeEventListener('touchstart', unlockAudio);
            document.removeEventListener('click', unlockAudio);
        }
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        function initAudioGraph(ctx) {
            // Pre-generate noise buffers once — reused by all explosions via new source nodes
            const makeNoise = (dur) => {
                const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
                return buf;
            };
            _noisePool = {
                body:    makeNoise(0.20),  // longer than max bodyDur (0.14s); gain envelope cuts it
                sizzle:  makeNoise(1.50),  // longer than max sizzleDur (1.1s)
                crackle: makeNoise(0.06)
            };

            // Synthesized outdoor reverb: 2s exponentially decaying stereo noise
            reverbNode = ctx.createConvolver();
            const len = Math.ceil(ctx.sampleRate * 2.0);
            const buf = ctx.createBuffer(2, len, ctx.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const d = buf.getChannelData(ch);
                for (let i = 0; i < len; i++)
                    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3.0);
            }
            reverbNode.buffer = buf;
            reverbGain = ctx.createGain();
            reverbGain.gain.value = 0;
            reverbNode.connect(reverbGain);
            reverbGain.connect(ctx.destination);

            _masterComp = ctx.createDynamicsCompressor();
            _masterComp.threshold.value = -6;
            _masterComp.knee.value = 3;
            _masterComp.ratio.value = 4;
            _masterComp.attack.value = 0.001;
            _masterComp.release.value = 0.1;
            _masterComp.connect(ctx.destination);
        }

        async function detectEarphones() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return false;
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                // Labels are available after getUserMedia; match common BT/wired identifiers
                return devices.some(d =>
                    /bluetooth|headset|headphone|earphone|airpod|a2dp|wireless/i.test(d.label)
                );
            } catch (e) { return false; }
        }

        function setEarphonesMode(active) {
            earphonesMode = active;
            if (reverbGain && audioCtx)
                reverbGain.gain.setTargetAtTime(active ? 0.28 : 0, audioCtx.currentTime, 0.5);
            const btn = document.getElementById('audio-mode-btn');
            btn.textContent = active ? '🎧' : '♪';
            /* 0.6 active vs 0.55 inactive: the 0.05 difference gives a perceptible
               state change without either value dominating the AR scene; 0.55 is the
               minimum for outdoor legibility. */
            btn.style.opacity = active ? '0.6' : '0.55';
        }
        const _audioFwd = new THREE.Vector3();
        const _audioUp = new THREE.Vector3();

        // Shared waveshaper curve — soft clip to generate harmonics from the thump oscillator,
        // making low frequencies audible on small phone speakers that can't reproduce true bass.
        const _shaperCurve = (() => {
            const c = new Float32Array(256);
            for (let i = 0; i < 256; i++) {
                const x = (i * 2) / 256 - 1;
                c[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
            }
            return c;
        })();

        function playExplosion(pos, shellType) {
            if (!audioCtx || !_noisePool || !_masterComp) return;
            if (audioCtx.state === 'suspended') { audioCtx.resume(); return; } // still locked; skip this boom
            const ctx = audioCtx;
            const now = ctx.currentTime;

            const panner = ctx.createPanner();
            panner.panningModel = 'HRTF';
            panner.distanceModel = 'inverse';
            panner.refDistance = 30;
            panner.rolloffFactor = 1;
            panner.setPosition(pos.x, pos.y, pos.z);
            panner.connect(_masterComp);
            if (earphonesMode && reverbNode) panner.connect(reverbNode); // wet send to reverb

            // Thump: earphones can reproduce true bass; speakers need higher freq with harmonics
            const thumpFreq = earphonesMode
                ? (shellType === 1 ? 80 : shellType === 3 ? 120 : shellType === 4 ? 95 : shellType === 5 ? 110 : 100)
                : (shellType === 1 ? 120 : shellType === 3 ? 180 : shellType === 4 ? 135 : shellType === 5 ? 160 : 150);
            const thumpOsc = ctx.createOscillator();
            thumpOsc.type = 'triangle';
            thumpOsc.frequency.setValueAtTime(thumpFreq, now);
            thumpOsc.frequency.exponentialRampToValueAtTime(thumpFreq * 0.4, now + 0.3);
            const shaper = ctx.createWaveShaper();
            shaper.curve = _shaperCurve;
            const thumpGain = ctx.createGain();
            thumpGain.gain.setValueAtTime(shellType === 3 ? 0.4 : shellType >= 4 ? 0.55 : 0.75, now);
            thumpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            thumpOsc.connect(shaper);
            shaper.connect(thumpGain);
            thumpGain.connect(panner);
            thumpOsc.start(now);
            thumpOsc.stop(now + 0.35);

            // Body: bandpass noise centred where phone speakers have actual output (300–600Hz)
            const bodyDur = shellType === 3 ? 0.08 : shellType >= 4 ? 0.10 : 0.14;
            const bodySrc = ctx.createBufferSource();
            bodySrc.buffer = _noisePool.body;
            const bodyFilter = ctx.createBiquadFilter();
            bodyFilter.type = 'bandpass';
            bodyFilter.frequency.value = shellType === 1 ? 300 : shellType === 3 ? 600
                                       : shellType === 4 ? 380 : shellType === 5 ? 560 : 420;
            bodyFilter.Q.value = 0.7;
            const bodyGain = ctx.createGain();
            bodyGain.gain.setValueAtTime(1.0, now);
            bodyGain.gain.exponentialRampToValueAtTime(0.001, now + bodyDur);
            bodySrc.connect(bodyFilter);
            bodyFilter.connect(bodyGain);
            bodyGain.connect(panner);
            bodySrc.start(now);

            // Sizzle tail: slow-decaying high-frequency noise (burning sparks)
            const sizzleDur = 0.6 + Math.random() * 0.5;
            const sizzleSrc = ctx.createBufferSource();
            sizzleSrc.buffer = _noisePool.sizzle; // gain envelope silences it at sizzleDur
            const sizzleFilter = ctx.createBiquadFilter();
            sizzleFilter.type = 'highpass';
            sizzleFilter.frequency.value = 3000;
            const sizzleGain = ctx.createGain();
            sizzleGain.gain.setValueAtTime(0.12, now);
            sizzleGain.gain.exponentialRampToValueAtTime(0.001, now + sizzleDur);
            sizzleSrc.connect(sizzleFilter);
            sizzleFilter.connect(sizzleGain);
            sizzleGain.connect(panner);
            sizzleSrc.start(now);

            // Crackle: Chrysanthemum gets extra pops spread over time
            if (shellType === 2) {
                for (let k = 0; k < 6; k++) {
                    const delay = 0.06 + Math.random() * 0.5;
                    const crackleSrc = ctx.createBufferSource();
                    crackleSrc.buffer = _noisePool.crackle;
                    const crackleGain = ctx.createGain();
                    crackleGain.gain.setValueAtTime(0.25 + Math.random() * 0.3, now + delay);
                    crackleGain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.04);
                    crackleSrc.connect(crackleGain);
                    crackleGain.connect(panner);
                    crackleSrc.start(now + delay);
                }
            }

            // Release panner from the graph after all sounds have faded so nodes don't accumulate
            const cleanupMs = (sizzleDur + 0.25) * 1000;
            setTimeout(() => { try { panner.disconnect(); } catch (_) {} }, cleanupMs);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Skip controls.update() when native path is active to avoid overwriting
            // camera.quaternion set by the onNativeOrientationUpdate handler. (ref: DL-009)
            if (controls && !nativeOrientationActive) controls.update();

            // Sync audio listener to phone orientation so panning follows head rotation
            if (audioCtx) {
                camera.getWorldDirection(_audioFwd);
                _audioUp.set(0, 1, 0).applyQuaternion(camera.quaternion);
                const L = audioCtx.listener;
                if (L.positionX !== undefined) {
                    L.positionX.value = 0; L.positionY.value = 0; L.positionZ.value = 0;
                    L.forwardX.value = _audioFwd.x; L.forwardY.value = _audioFwd.y; L.forwardZ.value = _audioFwd.z;
                    L.upX.value = _audioUp.x; L.upY.value = _audioUp.y; L.upZ.value = _audioUp.z;
                }
            }

            // Interaction: Fade illumination
            if (textIllumination > 0) {
                textIllumination -= 0.02;
                if (textIllumination < 0) textIllumination = 0;
            }
            if (arGroup) {
                // Lerp base opacities toward proximity targets
                const marqueeTarget = userDistanceToChurch <= 30 ? 0.8 : 0;
                const statsTarget   = userDistanceToChurch <= 20 ? 0.8 : 0;
                marqueeBaseOpacity += (marqueeTarget - marqueeBaseOpacity) * 0.008;
                statsBaseOpacity   += (statsTarget   - statsBaseOpacity)   * 0.008;

                arGroup.children.forEach(child => {
                    if (child === marqueeCylinder) {
                        child.material.opacity = marqueeBaseOpacity + (textIllumination * 0.6);
                    } else if (child.userData.isStat) {
                        child.material.opacity = (statsBaseOpacity * 0.5) + (textIllumination * 0.4);
                    } else if (child.userData.isGround) {
                        child.material.opacity = 0.025 + 0.015 * Math.sin(performance.now() * 0.0006);
                    } else if (child.userData.isMessageCylinder) {
                        child.rotation.y += 0.003; // counter-rotates against the outer marquee
                    }
                });
                marqueeCylinder.rotation.y -= 0.002;
            }

            if (showFireworks && fireworks.length < 15) {
                if (Math.random() < 0.1) fireworks.push(new Firework());
                if (Math.random() < 0.02 && fireworks.length < 13) {
                    fireworks.push(new Firework());
                    fireworks.push(new Firework());
                }
            }

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                if (fireworks[i].isDead) {
                    fireworks[i].destroy();
                    fireworks.splice(i, 1);
                }
            }
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function startExperience(uLat = targetLat, uLng = targetLng, isTestMode = false) {
            if (experienceStarted) return;
            experienceStarted = true;
            // Clears the web geo interval if still running; null-guard prevents double-clear.
            if (_webGeoIntervalId !== null) { clearInterval(_webGeoIntervalId); _webGeoIntervalId = null; }
            document.getElementById('debug-hud').style.display = 'none';
            try { document.documentElement.requestFullscreen().catch(err => console.log("Fullscreen API failed", err)); } catch (e) { }
            document.getElementById('status-text').style.opacity = '0';
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    const vid = document.getElementById('camera-bg');
                    vid.srcObject = stream;
                    vid.play().catch(() => {});
                })
                .catch(() => {
                    document.getElementById('status-message').innerText = 'Camera unavailable. Tap the upper-right corner three times to skip.';
                    document.getElementById('status-text').style.opacity = '1';
                });
                
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                initAudioGraph(audioCtx);
            } else if (!_noisePool) {
                initAudioGraph(audioCtx); // unlocked early but graph not yet built
            }
            audioCtx.resume().catch(() => {});
            // Try auto-detection immediately (works if camera permission granted label access)
            detectEarphones().then(found => { if (found) setEarphonesMode(true); });
            // Re-check whenever a device connects or disconnects
            navigator.mediaDevices.addEventListener('devicechange', async () => {
                setEarphonesMode(await detectEarphones());
            });

            controls = new THREE.DeviceOrientationControls(camera);

            // Compass calibration feedback
            const compassEl = document.getElementById('compass-indicator');
            compassEl.textContent = '◎ calibrating heading…';
            compassEl.style.opacity = '1';
            let bannerHeadingReceived = false;
            let bannerDismissed = false;
            // onBannerOrientation tracks whether any orientation event has fired during
            // the 8s window. Some Android sensor stacks never emit deviceorientationabsolute
            // even when heading is functional, so the banner uses this flag to distinguish
            // "heading working but not absolute" from "no sensor at all".
            // The named reference is removed via removeEventListener; it does NOT touch
            // DeviceOrientationControls' own internal listeners.
            const onBannerOrientation = () => { bannerHeadingReceived = true; };
            window.addEventListener('deviceorientation', onBannerOrientation);
            const onHeadingLocked = (e) => {
                if (e.absolute || e.type === 'deviceorientationabsolute') {
                    compassEl.textContent = '◉ heading locked';
                    setTimeout(() => { compassEl.style.opacity = '0'; }, 2500);
                    window.removeEventListener('deviceorientationabsolute', onHeadingLocked);
                    window.removeEventListener('deviceorientation', onHeadingLocked);
                    window.removeEventListener('deviceorientation', onBannerOrientation);
                    bannerDismissed = true;
                }
            };
            window.addEventListener('deviceorientationabsolute', onHeadingLocked);
            window.addEventListener('deviceorientation', onHeadingLocked);
            // 8s timeout: typical mid-range Android magnetometer lock is 3-6s; doubling the
            // upper bound covers cold-start near reinforced concrete without exceeding the
            // ~10s wearer-tolerance threshold for unexplained UI elements.
            setTimeout(() => {
                if (bannerDismissed) return;
                window.removeEventListener('deviceorientation', onBannerOrientation);
                window.removeEventListener('deviceorientationabsolute', onHeadingLocked);
                window.removeEventListener('deviceorientation', onHeadingLocked);
                if (bannerHeadingReceived) {
                    compassEl.textContent = '◉ heading active';
                    setTimeout(() => { compassEl.style.opacity = '0'; }, 2500);
                } else {
                    compassEl.style.opacity = '0';
                }
                bannerDismissed = true;
            }, 8000);
            arGroup = createARGroup(uLat, uLng, isTestMode);
            scene.add(arGroup);

            // 60s after experience starts, fade in a personal inner cylinder
            setTimeout(() => {
                if (!arGroup) return;
                const msgStart = new Date('2008-05-15T00:00:00');
                const msgNow = new Date();
                let yr = msgNow.getFullYear() - msgStart.getFullYear();
                if (msgNow.getMonth() < msgStart.getMonth() ||
                    (msgNow.getMonth() === msgStart.getMonth() && msgNow.getDate() < msgStart.getDate())) yr--;

                const msgCanvas = document.createElement('canvas');
                msgCanvas.width = 2048; msgCanvas.height = 192;
                const msgCtx = msgCanvas.getContext('2d');
                msgCtx.font = "56px sans-serif";
                msgCtx.textAlign = "center";
                msgCtx.textBaseline = "middle";
                msgCtx.fillStyle = "rgba(255, 210, 235, 0.9)";
                const line = `${yr} years. Still you. Always you.`;
                for (let i = 0; i < 2; i++) msgCtx.fillText(line, 512 + i * 1024, 96);

                const msgMat = new THREE.MeshBasicMaterial({
                    map: new THREE.CanvasTexture(msgCanvas),
                    transparent: true, opacity: 0,
                    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
                });
                const msgMesh = new THREE.Mesh(new THREE.CylinderGeometry(12, 12, 3, 64, 1, true), msgMat);
                msgMesh.userData.isMessageCylinder = true;
                arGroup.add(msgMesh);

                const msgFade = setInterval(() => {
                    msgMat.opacity = Math.min(msgMat.opacity + 0.008, 0.65);
                    if (msgMat.opacity >= 0.65) clearInterval(msgFade);
                }, 50);
            }, 60000);

            if (isTestMode) {
                // Test mode: simulate standing at the church — reveal everything immediately
                userDistanceToChurch = 0;
            } else if (!window.__nativeLocationActive) { // Native path already updating userDistanceToChurch (ref: DL-003, DL-010)
                // Production: keep tracking position to drive the proximity reveal
                _watchId = navigator.geolocation.watchPosition(pos => {
                    userDistanceToChurch = getDistanceKm(
                        pos.coords.latitude, pos.coords.longitude, targetLat, targetLng
                    ) * 1000;
                }, null, { enableHighAccuracy: true });
            }

            setTimeout(() => {
                document.getElementById('status-text').style.display = 'none';
                document.getElementById('camera-bg').style.opacity = '1';
                showFireworks = true;
            }, 1000);
        }

        let _isTestMode = false;
        let _watchId = null;

        function formatDistanceHint(metres) {
            if (metres < 1000) {
                const metresBucket = Math.floor(metres / 10) * 10;
                return `Approx ${metresBucket}m to go`;
            } else {
                const kmBucket = Math.floor(metres / 100) / 10;
                return `Approx ${kmBucket}km to go`;
            }
        }

        /**
         * startWebGeoInterval — Fallback pre-trigger GPS polling via navigator.geolocation.
         * Starts a 3-second setInterval that calls getCurrentPosition and updates the
         * debug HUD, triggers startExperience when within 100m, or shows a distance hint.
         * Guard flag _webGeoIntervalStarted prevents multiple intervals from being
         * registered if both the start() fallback path and the 2s watchdog fire. (ref: DL-003)
         */
        let _webGeoIntervalStarted = false;
        let _webGeoIntervalId = null;
        function startWebGeoInterval() {
            if (_webGeoIntervalStarted) return;
            _webGeoIntervalStarted = true;
            _webGeoIntervalId = setInterval(() => {
                if (navigator.geolocation && !experienceStarted) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        // startExperience clears _webGeoIntervalId on entry to prevent the interval
                        // from polling while the AR scene is active.
                        const metres = getDistanceKm(pos.coords.latitude, pos.coords.longitude, targetLat, targetLng) * 1000;
                        const acc = pos.coords.accuracy != null ? Math.round(pos.coords.accuracy) : '?';
                        document.getElementById('debug-hud').innerHTML =
                            `dist: ${Math.round(metres)}m<br>trigger: ≤100m<br>GPS acc: ±${acc}m`;
                        if (metres <= 100) {
                            startExperience(pos.coords.latitude, pos.coords.longitude, false);
                        } else {
                            // 10m buckets: GPS outdoor accuracy is ~100m class; 10m steps
                            // change visibly between 3s polls at walking pace. 0.1km steps
                            // above 1km avoid implying sub-100m precision.
                            document.getElementById('status-message').innerText = formatDistanceHint(metres);
                        }
                    }, (err) => {
                        // A missing error callback leaves permission-denied unrecoverable
                        // for the wearer at the venue. Map known error codes to readable
                        // copy so the wearer can act.
                        let msg;
                        if (err.code === err.PERMISSION_DENIED) msg = 'Location permission denied. Enable it in Android settings.';
                        else if (err.code === err.POSITION_UNAVAILABLE) msg = 'Location unavailable. Step outside for clearer sky.';
                        else msg = 'Location is taking longer than usual...';
                        document.getElementById('status-message').innerText = msg;
                        document.getElementById('debug-hud').innerHTML = `GPS error ${err.code}`;
                    }, { enableHighAccuracy: true });
                }
            }, 3000);
        }

        let lastNativeLocationAt = 0;

        /**
         * bootstrapSensors — Entry point for the native sensor bridge initialization.
         * Runs once at page load as an IIFE.
         *
         * Strategy (ref: DL-003, DL-008, DL-013):
         * 1. If Capacitor.Plugins.SensorBridge is present, register listeners for both
         *    onNativeOrientationUpdate and onNativeLocationUpdate, then call start().
         * 2. start() resolves with status=fallback (permission denied) -> startWebGeoInterval().
         * 3. A 2000ms watchdog fires startWebGeoInterval() if no location event has
         *    arrived, covering GPS cold-start latency without blocking the splash transition.
         * 4. If SensorBridge is absent (non-Capacitor environment), startWebGeoInterval()
         *    runs immediately.
         *
         * onNativeOrientationUpdate sets nativeOrientationActive=true on first event,
         * causing animate() to stop calling controls.update(). (ref: DL-008, DL-009)
         * onNativeLocationUpdate guards isTestMode to prevent native GPS from overwriting
         * the zeroed userDistanceToChurch during triple-tap test mode. (ref: DL-010)
         */
        (function bootstrapSensors() {
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SensorBridge) {
                const SensorBridge = window.Capacitor.Plugins.SensorBridge;

                SensorBridge.addListener('onNativeOrientationUpdate', (data) => {
                    nativeOrientationActive = true;
                    camera.quaternion.set(data.x, data.y, data.z, data.w);
                });

                SensorBridge.addListener('onNativeLocationUpdate', (data) => {
                    lastNativeLocationAt = Date.now();
                    window.__nativeLocationActive = true;
                    if (_watchId !== null) {
                        navigator.geolocation.clearWatch(_watchId);
                        _watchId = null;
                    }
                    const metres = getDistanceKm(data.latitude, data.longitude, targetLat, targetLng) * 1000;
                    const acc = data.accuracy != null ? Math.round(data.accuracy) : '?';
                    document.getElementById('debug-hud').innerHTML =
                        `dist: ${Math.round(metres)}m<br>trigger: ≤100m<br>GPS acc: ±${acc}m`;
                    if (!experienceStarted && metres <= 100) {
                        startExperience(data.latitude, data.longitude, false);
                    } else if (experienceStarted && !_isTestMode) {
                        userDistanceToChurch = metres;
                    } else if (!experienceStarted) {
                        document.getElementById('status-message').innerText = formatDistanceHint(metres);
                    }
                });

                SensorBridge.start().then((result) => {
                    if (result && result.status === 'fallback') {
                        startWebGeoInterval();
                    }
                }).catch(() => {
                    startWebGeoInterval();
                });

                setTimeout(() => {
                    if (lastNativeLocationAt === 0) {
                        startWebGeoInterval();
                    }
                }, 2000);
            } else {
                startWebGeoInterval();
            }
        })();

        document.getElementById('audio-mode-btn').addEventListener('click', () => {
            setEarphonesMode(!earphonesMode);
        });

        let tapCount = 0;
        document.getElementById('secret-override').addEventListener('click', () => {
            tapCount++;
            if (tapCount >= 3) {
                // [40,60,120] = Material action-confirmed short-short-long cadence,
                // distinguishable from the per-tap 60ms tick.
                // typeof guard required: navigator.vibrate is absent on some Android WebView configs without the VIBRATE permission declared in AndroidManifest.
                if (typeof navigator.vibrate === 'function') navigator.vibrate([40, 60, 120]);
                _isTestMode = true;
                startExperience(targetLat, targetLng, true);
            } else {
                // 60ms matches Material Design short-tick (keyboard tap 50ms, button 70ms).
                if (typeof navigator.vibrate === 'function') navigator.vibrate(60);
            }
        });
    </script>
</body>

</html>
